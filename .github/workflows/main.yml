name: My First DevOps Pipeline

# Kab chalega? Jab bhi main branch pe push hoga
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. GitHub se code nikalne ke liye
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. DockerHub mein login karne ke liye
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Image build karke DockerHub pe bhejne ke liye
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: shubhangi23/nodejs-app:latest